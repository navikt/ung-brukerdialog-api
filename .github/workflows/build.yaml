name: "Bygg og deploy"
on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - '**.MD'
      - '.gitignore'
      - 'LICENSE'
      - 'CODEOWNERS'
      - '.github/*.yml'

jobs:
  build-app:
    name: Bygg docker image
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: navikt/sif-gha-workflows/.github/workflows/maven-build-app-db.yml@main
    with:
      runs-on: ${{ (github.ref_name == github.event.repository.default_branch && 'ubuntu-latest-8-cores' || 'ubuntu-latest-4-cores') }}
      java-version: 25
      skip-tests: true
      build-image: true
      push-image: ${{ github.ref_name == github.event.repository.default_branch}}
      upload-image: ${{ github.ref_name != github.event.repository.default_branch }}
      db_schema: ung_brukerdialog_api_unit
      pg_version: 16
      t-2c: "-T1C"
    secrets: inherit

  run-unit-tests:
    name: Enhetstester
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: navikt/sif-gha-workflows/.github/workflows/maven-build-app-db.yml@main
    with:
      runs-on: ${{ (github.ref_name == github.event.repository.default_branch && 'ubuntu-latest-8-cores' || 'ubuntu-latest-4-cores') }}
      java-version: 25
      skip-tests: false
      build-image: false
      push-image: false
      upload-image: false
      db_schema: ung_brukerdialog_api_unit
      pg_version: 16
      t-2c: "-T1C"
    secrets: inherit

  verdikjede-tester:
    name: Verdikjedetester
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      packages: read
    uses: navikt/sif-gha-workflows/.github/workflows/verdikjede-test-v2.yml@main
    if: ${{github.actor != 'dependabot[bot]'}}
    needs: build-app
    with:
      tag: ${{ needs.build-app.outputs.build-version }}
      suites: "ung,ung-tilbake,frontend-ung,aktivitetspenger"
      override_image_artifact_name: ${{ github.ref_name != github.event.repository.default_branch && needs.build-app.outputs.image-artifact-name || null }}
      image_version: ${{ needs.build-app.outputs.build-version }}

  verdikjede-tester-dependabot:
    name: Verdikjedetester Dependabot
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      packages: read
    uses: navikt/sif-gha-workflows/.github/workflows/verdikjede-test-v2.yml@main
    if: ${{github.actor == 'dependabot[bot]'}}
    needs: build-app
    with:
      tag: ${{ needs.build-app.outputs.build-version }}
      suites: "ung,aktivitetspenger"
      override_image_artifact_name: ${{ github.ref_name != github.event.repository.default_branch && needs.build-app.outputs.image-artifact-name || null }}
      image_version: ${{ needs.build-app.outputs.build-version }}


  deploy-dev:
    name: Deploy dev
    permissions:
      id-token: write
      contents: write
    if: github.ref_name == 'master'
    needs: [build-app, run-unit-tests]
    uses: navikt/sif-gha-workflows/.github/workflows/maven-deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: dev-gcp
      naiserator_file: deploy/dev-gcp.yml
    secrets: inherit

  deploy-prod:
    name: Deploy prod
    permissions:
      id-token: write
      contents: write
    if: github.ref_name == 'master'
    needs: [build-app, run-unit-tests, verdikjede-tester, deploy-dev]
    uses: navikt/sif-gha-workflows/.github/workflows/maven-deploy.yml@main
    with:
      gar: true
      image: ${{ needs.build-app.outputs.build-version }}
      cluster: prod-gcp
      naiserator_file: deploy/prod-gcp.yml
    secrets: inherit

  analyze-logs:
    name: Analyser testlogger
    needs: [verdikjede-tester, verdikjede-tester-dependabot]
    if: ${{ always() && github.ref_name == 'master' && (needs.verdikjede-tester.result == 'failure' || needs.verdikjede-tester-dependabot.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Last ned ung-logs artefakt
        id: download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ung-logs
          path: ung-logs
        continue-on-error: true

      - name: Ingen loggfiler tilgjengelig
        if: ${{ steps.download.outcome == 'failure' }}
        run: |
          echo "Ingen ung-logs artefakt funnet for kjøring ${{ github.run_id }} – hopper over analyse."

      - name: Hent GHA job-logger for verdikjedetester
        if: ${{ steps.download.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          job_ids=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs \
            --jq '[.jobs[] | select(.name | test("Verdikjedetester"; "i")) | .id] | .[]')
          for job_id in $job_ids; do
            echo "Henter logg for jobb $job_id ..."
            gh api repos/${{ github.repository }}/actions/jobs/${job_id}/logs \
              > ung-logs/gha-verdikjede-${job_id}.log 2>/dev/null || true
          done

      - name: Kjør logganalyse
        if: ${{ steps.download.outcome == 'success' }}
        env:
          LOG_DIR: ung-logs
          OUT_DIR: analysert
        run: |
          if [ ! -d "$LOG_DIR" ] || ! ls "$LOG_DIR"/*.log >/dev/null 2>&1; then
            echo "Ingen gyldige loggfiler funnet i ${LOG_DIR} – hopper over analyse."
            exit 0
          fi
          python3 .github/scripts/analyze-verdikjede-logs.py

      - name: Last opp analyserte logger
        if: ${{ steps.download.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ung-logs-analysert
          path: analysert/
          retention-days: 14
          if-no-files-found: warn
